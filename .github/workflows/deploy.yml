name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install flask flake8

    - name: Lint code
      run: |
        flake8 app.py --max-line-length=100 --ignore=W292,W293,E302,E305
        echo "Code quality check passed!"

    - name: Test Flask app
      run: |
        python -c "
        from app import app
        client = app.test_client()
        response = client.get('/')
        assert response.status_code == 200
        print('App test passed!')
        "

  docker-and-deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -t devops-portfolio:latest .
        echo "Docker build successful!"

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ec2-user
          if [ -d "devops_portfolio" ]; then
            cd devops_portfolio
            git pull origin main
          else
            git clone https://github.com/kowshikaarumugam/devops_portfolio.git
            cd devops_portfolio
          fi
          docker stop portfolio-app || true
          docker rm portfolio-app || true
          docker build -t devops-portfolio .
          docker run -d -p 5000:5000 --name portfolio-app devops-portfolio
          echo "Deployment successful!"